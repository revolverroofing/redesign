name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm build

      - name: Run Playwright tests
        shell: bash
        run: |
          set -o pipefail
          pnpm test:e2e 2>&1 | tee /tmp/playwright.log

      - name: Surface output on workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Playwright output"
            echo ""
            echo '```'
            # Tail to last 200 lines to stay under the 1 MB step-summary cap
            tail -n 200 /tmp/playwright.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
          if-no-files-found: ignore
